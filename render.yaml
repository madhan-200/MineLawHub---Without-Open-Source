services:
  - type: web
    name: minelawhub-backend
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: CORS_ORIGINS
        value: "https://minelaw.netlify.app,http://localhost:3000"
      - key: RENDER
        value: "true"
